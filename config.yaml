baseurl: "https://www.yopa.page/"
relativeURLs: true
locale: en-us
defaultContentLanguage: en
defaultContentLanguageInSubdir: false
title: thats.nono
theme: "hugo-tania"
pagination:
  pagerSize: 8
googleAnalytics: G-EQ4B3K8VCL
uglyurls: true

languages:
  en:
    locale: en-us
    label: English
    weight: 1
  ko:
    locale: ko-kr
    label: 한국어
    weight: 2
    title: thats.nono

# Configure taxonomies explicitly
taxonomies:
  tag: tags
  category: categories

# Keep Article Atlas trails and article-page recommendations on the same
# build-time relationship model. Series wins, followed by shared topics.
related:
  threshold: 20
  includeNewer: true
  toLower: true
  indices:
    - name: series
      weight: 500
    - name: categories
      weight: 70
    - name: tags
      weight: 40
    - name: date
      weight: 5
      pattern: "2006"

# Define main sections for content filtering
params:
  mainSections: ["blog"]
  titleLogo: images/08WeMC.png
  images:
    - images/8yRnin.png
  enableFootnotes: true
  siteName: thats.nono
  siteDesc: A blog that's gonna put your software engineering skills to the test.
  author: Yoonsoo Park
  maxCategoryToShow: 10
  articleAtlasPresenceEnabled: true
  # Optional monetization links stay disabled until their values are supplied.
  articleAtlasSupportUrl: ""
  adSensePublisherId: "ca-pub-3902057519310243"
  articleAdSlot: ""
  socialOptions:
    email: yoonsoo@duck.com
    github: https://github.com/ypark9/yopa.page
    twitter: https://twitter.com/
  UseHugoToc: true

# permalinks:
#   post: :title

menu:
  header:
    - name: About
      url: "/about.html"
    - name: Articles
      url: "/articles.html"
  footer:
    - name: About
      url: "/about.html"
    - name: Articles
      url: "/articles.html"
    - name: GitHub
      url: "https://github.com/ypark9/yopa.page"
    - name: RSS
      url: "/index.xml"

markup:
  highlight:
    noClasses: false
    lineNos: true
  goldmark:
    renderer:
      unsafe: true

sitemap:
  changefreq: daily
  filename: sitemap.xml
  priority: 0.5

outputFormats:
  LLMS:
    mediaType: "text/plain"
    baseName: "llms"
    isPlainText: true
    notAlternative: true

outputs:
  home: ["HTML", "RSS", "JSON", "LLMS"]
